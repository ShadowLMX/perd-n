<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdon 🥺❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ffd6e8,#dbe9ff,#e8d6ff);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:rgba(255,255,255,.85);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:420px;
    box-shadow:0 20px 40px rgba(0,0,0,.15);
    animation:fadeIn 1.5s ease;
}

h1{
    font-family:'Playfair Display',serif;
    color:#7a3fa0;
    margin-bottom:20px;
}

p{
    font-size:1rem;
    color:#555;
    margin-bottom:25px;
    min-height:90px;
}

button{
    border:none;
    background:linear-gradient(135deg,#ff7eb3,#9b6dff);
    color:white;
    padding:12px 25px;
    border-radius:30px;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    margin:5px;
}

button:hover{transform:scale(1.05);}
.hidden{display:none;}

.heart{
    position:absolute;
    bottom:-20px;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{transform:translateY(0)}
    to{transform:translateY(-110vh)}
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">¿Me perdonas? 🥺</h1>
    <p id="text">Antes de seguir… podrías responder pofi? 🥺❤️</p>

    <div id="gameBtns">
        <button id="yesBtn">chi ❤️</button>
        <button id="noBtn">No💔 </button>
    </div>

    <button id="openLetter" class="hidden">Antes de que sigas… ❤️</button>
    <button id="finalBtn" class="hidden">¿Me das otra oportunidad? 🥺❤️</button>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/10/16/audio_3d3b6f6b91.mp3">
</audio>

<script>
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const openLetter=document.getElementById("openLetter");
const finalBtn=document.getElementById("finalBtn");
const text=document.getElementById("text");
const title=document.getElementById("title");
const music=document.getElementById("music");

const message=`misa, sé que hice mal al  haberte hablado así no cuando debía.
No hay excusas ni justificaciones para eso. 
Entiendo que mis palabras pudo hacerte sentir mal o lastimado, y la verdad es que nunca fue mi intención provocarte algo así.

A veces una se equivoca sin medir el impacto de sus acciones, pero eso no quita la responsabilidad. 

Te prometo que no lo volveré a hacer.`;

let i=0;

// mover NO (PC + iPhone)
function moveNo(){
    const rect = document.querySelector('.container').getBoundingClientRect();
    const x = Math.random()*(rect.width-120) - rect.width/2;
    const y = Math.random()*(rect.height-120) - rect.height/2;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("touchstart", moveNo);
noBtn.addEventListener("click", moveNo);

yesBtn.addEventListener("click",()=>{
    title.innerText="🥹❤️ Gracias…";
    text.innerText="En serio, perdón. Juegamos?🥺❤️";
    document.getElementById("gameBtns").classList.add("hidden");
    openLetter.classList.remove("hidden");
});

openLetter.addEventListener("click",()=>{
    music.play();
    title.innerText="Perdón, Misa 🥺❤️";
    text.innerHTML="";
    openLetter.classList.add("hidden");
    typeWriter();
});

function typeWriter(){
    if(i<message.length){
        text.innerHTML+=message.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }else{
        finalBtn.classList.remove("hidden");
    }
}

finalBtn.addEventListener("click",()=>{
    title.innerText="❤️";
    text.innerText="Gracias por leerme. Te amo mucho. ❤️";
    finalBtn.classList.add("hidden");
    explodeHearts();
});

function createHeart(){
    const h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=Math.random()*20+15+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),8000);
}

function explodeHearts(){
    for(let i=0;i<30;i++){
        setTimeout(createHeart,i*120);
    }
}

setInterval(createHeart,900);
</script>

</body>
</html>
